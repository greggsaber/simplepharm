<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Patient Verification | PharmaFlow</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

    <div class="logo">

        💊 PharmaFlow

    </div>


    <div class="subtitle">

        Prescription Refill Portal

    </div>


</header>



<main>


<div class="card">


    <!-- Progress -->

    <div class="progress">


        <div class="step completed">

            ✓

        </div>


        <div class="line completed"></div>


        <div class="step active">

            2

        </div>


        <div class="line"></div>


        <div class="step">

            3

        </div>


        <div class="line"></div>


        <div class="step">

            4

        </div>


    </div>



    <h1>

        Patient Verification

    </h1>



    <p class="description">

        Please verify your identity before viewing your repeat prescriptions.

    </p>



    <br>



    <div class="form-group">


        <label for="ic">

            NRIC / FIN

        </label>


        <input

            type="text"

            id="ic"

            placeholder="e.g. S1234567A"

        >


    </div>




    <div class="form-group">


        <label for="dob">

            Date of Birth

        </label>


        <input

            type="date"

            id="dob"

        >


    </div>




    <p id="errorMessage" class="error"></p>




    <button id="loginButton">

        Continue →

    </button>





    <div class="notice">


        <h3>

            Demo Accounts

        </h3>



        <div class="table-wrapper">


            <table>


                <tr>

                    <th>NRIC</th>

                    <th>Date of Birth</th>

                </tr>



                <tr>

                    <td>S1234567A</td>

                    <td>1985-03-15</td>

                </tr>



                <tr>

                    <td>S2345678B</td>

                    <td>1970-08-21</td>

                </tr>



                <tr>

                    <td>S3456789C</td>

                    <td>1992-01-10</td>

                </tr>


            </table>


        </div>


    </div>



</div>


</main>



<script src="js/database.js"></script>

<script src="js/auth.js"></script>


</body>

</html>
